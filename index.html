<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lollie | Wattpad</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* General Setup */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: serif;
        }

        /* Main Background Image */
        body {
            background-image: url('background.jpg'); /* Ensure your image is named exactly this */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* The Soft Milky-Minty Green Rectangle */
        .container {
            background-color: #e0f2f1; /* Milky mint green */
            width: 90%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            border-radius: 10px; /* Subtle rounding for aesthetic */
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* Profile Picture in a circle */
        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 2px solid rgba(0,0,0,0.05);
        }

        /* Simple Line Banner */
        .line-banner {
            border: 0;
            height: 1px;
            background: #b2dfdb; /* Darker mint for the line */
            width: 80%;
            margin: 0 auto 20px auto;
        }

        /* The Name "lollie" */
        .name {
            font-family: 'Pacifico', cursive;
            font-size: 28px;
            color: #4a4a4a;
            margin: 0;
            text-transform: lowercase;
        }

        /* Wave Banner */
        .wave {
            font-size: 24px;
            color: #757575;
            margin: 10px 0;
        }

        /* Wattpad Link */
        .wattpad-link {
            font-family: "Times New Roman", Times, serif;
            font-size: 22px;
            color: #2c3e50;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .wattpad-link:hover {
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="profile.jpg" alt="Profile" class="profile-pic">

        <hr class="line-banner">

        <p class="name">lollie</p>

        <div class="wave">~</div>

        <a href="https://www.wattpad.com/user/vivssx_" class="wattpad-link">Wattpad</a>
    </div>

</body>
</html>
